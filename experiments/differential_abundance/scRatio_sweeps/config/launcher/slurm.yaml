# @package _global_

defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    partition: gpu_p
    qos: gpu_normal
    cpus_per_task: 6
    mem_gb: 100
    gres: gpu:1
    timeout_min: 1440
    array_parallelism: 20
    exclude: supergpu02, gpusrv29, gpusrv50, gpusrv39, gpusrv46, gpusrv28